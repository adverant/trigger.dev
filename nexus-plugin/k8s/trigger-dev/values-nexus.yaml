# =============================================================================
# Trigger.dev Self-Hosted Helm Values for Nexus Integration
# =============================================================================
# Override file for the official Trigger.dev Helm chart
# Repo: https://github.com/triggerdotdev/trigger.dev/tree/main/helm-charts
#
# Usage:
#   helm install trigger-dev oci://ghcr.io/triggerdotdev/trigger.dev/helm \
#     -f values-nexus.yaml \
#     -n nexus
# =============================================================================

# -- Global configuration
global:
  namespace: nexus

# -- Webapp (API Server + Dashboard)
webapp:
  replicaCount: 2
  image:
    repository: ghcr.io/triggerdotdev/trigger.dev
    tag: "v4"
    pullPolicy: IfNotPresent
  port: 3030
  env:
    # Application
    NODE_ENV: "production"
    APP_ORIGIN: "https://api.adverant.ai"
    LOGIN_ORIGIN: "https://api.adverant.ai"
    # Runtime
    RUNTIME_PLATFORM: "kubernetes"
    # Telemetry
    TRIGGER_TELEMETRY_DISABLED: "1"
  envSecrets:
    # These must be created in the nexus-trigger-dev-secrets Secret
    SESSION_SECRET:
      secretName: nexus-trigger-dev-secrets
      key: SESSION_SECRET
    MAGIC_LINK_SECRET:
      secretName: nexus-trigger-dev-secrets
      key: MAGIC_LINK_SECRET
    ENCRYPTION_KEY:
      secretName: nexus-trigger-dev-secrets
      key: ENCRYPTION_KEY
    MANAGED_WORKER_SECRET:
      secretName: nexus-trigger-dev-secrets
      key: MANAGED_WORKER_SECRET
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"
  service:
    type: ClusterIP
    port: 3030
  livenessProbe:
    httpGet:
      path: /healthcheck
      port: 3030
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /healthcheck
      port: 3030
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 2

# -- Supervisor (Worker Manager)
supervisor:
  replicaCount: 1
  image:
    repository: ghcr.io/triggerdotdev/trigger.dev/supervisor
    tag: "v4"
    pullPolicy: IfNotPresent
  env:
    PLATFORM: "kubernetes"
    FORCE_KUBERNETES: "true"
  envSecrets:
    MANAGED_WORKER_SECRET:
      secretName: nexus-trigger-dev-secrets
      key: MANAGED_WORKER_SECRET
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "2Gi"

# -- PostgreSQL (disabled - use Nexus shared PostgreSQL)
postgresql:
  deploy: false
  external:
    host: "nexus-postgres.nexus.svc.cluster.local"
    port: 5432
    database: "trigger_dev"
    existingSecret:
      name: nexus-secrets
      userKey: POSTGRES_USER
      passwordKey: POSTGRES_PASSWORD

# -- Redis (disabled - use Nexus shared Redis)
redis:
  deploy: false
  external:
    host: "nexus-redis.nexus.svc.cluster.local"
    port: 6379
    database: 4

# -- ClickHouse (deploy for Trigger.dev run analytics)
clickhouse:
  deploy: true
  image:
    repository: clickhouse/clickhouse-server
    tag: "24.3"
    pullPolicy: IfNotPresent
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "2000m"
      memory: "4Gi"

# -- MinIO (S3-compatible object storage for artifacts)
minio:
  deploy: true
  image:
    repository: minio/minio
    tag: "latest"
    pullPolicy: IfNotPresent
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  envSecrets:
    MINIO_ROOT_USER:
      secretName: nexus-trigger-dev-secrets
      key: MINIO_ROOT_USER
    MINIO_ROOT_PASSWORD:
      secretName: nexus-trigger-dev-secrets
      key: MINIO_ROOT_PASSWORD
  defaultBuckets: "trigger-dev-artifacts"

# -- Secrets template (create this Secret before deploying)
# apiVersion: v1
# kind: Secret
# metadata:
#   name: nexus-trigger-dev-secrets
#   namespace: nexus
# type: Opaque
# data:
#   SESSION_SECRET: <base64>        # openssl rand -hex 32
#   MAGIC_LINK_SECRET: <base64>     # openssl rand -hex 32
#   ENCRYPTION_KEY: <base64>        # openssl rand -hex 16 (must be exactly 16 bytes)
#   MANAGED_WORKER_SECRET: <base64> # openssl rand -hex 32
#   MINIO_ROOT_USER: <base64>       # e.g., echo -n "triggerdev" | base64
#   MINIO_ROOT_PASSWORD: <base64>   # openssl rand -hex 32

# -- Security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

# -- Service account
serviceAccount:
  create: true
  name: trigger-dev-webapp
  annotations: {}

# -- Istio integration
istio:
  enabled: true
  gateway: "istio-system/nexus-stack-gateway"
