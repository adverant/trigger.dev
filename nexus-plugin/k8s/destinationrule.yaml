apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: nexus-trigger
  namespace: nexus
  labels:
    app: nexus-trigger
    app.kubernetes.io/name: nexus-trigger
    version: v1
    category: plugin
    risk-level: medium
spec:
  host: nexus-trigger.nexus.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
        connectTimeout: 30s
        tcpKeepalive:
          time: 7200s
          interval: 75s
      http:
        http1MaxPendingRequests: 50
        http2MaxRequests: 100
        maxRequestsPerConnection: 10
        idleTimeout: 3600s
    loadBalancer:
      simple: LEAST_REQUEST
      localityLbSetting:
        enabled: true
        distribute:
          - from: "*"
            to:
              "*": 100
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
      minHealthPercent: 50
      splitExternalLocalOriginErrors: true
    tls:
      mode: ISTIO_MUTUAL
  subsets:
    - name: stable
      labels:
        version: v1
    - name: canary
      labels:
        version: v2
